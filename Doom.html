<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My GitHub Page with Doom Easter Egg</title>
    <script src="https://js-dos.com/js-dos.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #doom-container {
            width: 640px;
            height: 480px;
            margin: 20px auto;
            opacity: 0; /* hidden initially */
            transition: opacity 0.5s;
        }

        #secret-code {
            display: inline-block;
            margin-top: 20px;
            padding: 5px 10px;
            font-size: 16px;
        }

        #unlock-button {
            padding: 5px 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
<!-- Hidden Easter egg link -->
<a href="https://wadcmd.com/" id="doom-link" style="display:none;" target="_blank">Play Doom</a>

<!-- Secret code input -->
<input type="text" id="secret-code" placeholder="Enter secret code">
<button id="unlock-button">Unlock</button>

<script>
    document.getElementById("unlock-button").addEventListener("click", () => {
        const code = document.getElementById("secret-code").value.trim().toUpperCase();
        if(code === "IDDQD") { // secret code
            const link = document.getElementById("doom-link");
            link.style.display = "inline"; // reveal the link
            link.click(); // automatically open it
        } else {
            alert("Wrong code!");
        }
    });
</script>

</body>
</html>
